<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>KuzenHub | Anime Projects</title>
        <meta
            name="description"
            content="A curated collection of my anime-related web projects. Exploring the world of anime through code."
        />
        <link rel="stylesheet" href="style.css" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap"
            rel="stylesheet"
        />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
        />
        <link rel="icon" type="image/png" href="img/favicon.png" />
        <link rel="apple-touch-icon" href="img/favicon.png" />
    </head>
    <body>
        <div class="background-overlay"></div>
        <div class="container">
            <header class="profile">
                <div class="profile-img-container">
                    <img
                        src="img/profile.png"
                        alt="Profile"
                        id="profile-img"
                        class="profile-img"
                    />
                </div>
                <h1 id="profile-name">Kuzen</h1>
                <p id="profile-bio">
                    Anime Enthusiast & Web Developer. Building tools for the
                    community.
                </p>
            </header>

            <main class="links-container">
                <a
                    href="https://kuzen.web.id"
                    class="link-card"
                    id="link-kuzenv3"
                    target="_blank"
                >
                    <div class="link-icon"><i class="fas fa-play"></i></div>
                    <div class="link-content">
                        <h3>KuzenV1</h3>
                        <p>Streaming platform with double API.</p>
                    </div>
                    <div class="link-arrow">
                        <i class="fas fa-chevron-right"></i>
                    </div>
                </a>

                <a
                    href="https://anime.kuzen.web.id"
                    class="link-card"
                    id="link-kuzenv3"
                    target="_blank"
                >
                    <div class="link-icon"><i class="fas fa-play"></i></div>
                    <div class="link-content">
                        <h3>KuzenV3</h3>
                        <p>Streaming platform with aggregator API.</p>
                    </div>
                    <div class="link-arrow">
                        <i class="fas fa-chevron-right"></i>
                    </div>
                </a>

                <a
                    href="api.kuzen.web.id"
                    class="link-card"
                    id="link-scraper"
                    target="_blank"
                >
                    <div class="link-icon"><i class="fas fa-code"></i></div>
                    <div class="link-content">
                        <h3>Anime Scraper API</h3>
                        <p>High-performance scraper API.</p>
                    </div>
                    <div class="link-arrow">
                        <i class="fas fa-chevron-right"></i>
                    </div>
                </a>

                <a
                    href="https://v3.kuzen.web.id/community"
                    class="link-card"
                    id="link-community"
                    target="_blank"
                >
                    <div class="link-icon"><i class="fas fa-users"></i></div>
                    <div class="link-content">
                        <h3>Kuzen Community</h3>
                        <p>Connect with other fans and share reviews.</p>
                    </div>
                    <div class="link-arrow">
                        <i class="fas fa-chevron-right"></i>
                    </div>
                </a>
            </main>

            <footer class="socials">
                <a href="#" class="social-icon" aria-label="GitHub"
                    ><i class="fab fa-github"></i
                ></a>
                <a href="#" class="social-icon" aria-label="Instagram"
                    ><i class="fab fa-instagram"></i
                ></a>
                <a href="#" class="social-icon" aria-label="Discord"
                    ><i class="fab fa-discord"></i
                ></a>
            </footer>
        </div>

        <script src="script.js"></script>
    </body>
</html>
